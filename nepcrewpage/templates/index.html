{% extends 'layouts.html' %}
{% load static %}

{% block content %}
<section class="hero">
  <div class="promo-box">
    <div class="promo-slider">
      <img src="{% static 'images/streetwear.png' %}" class="slide active" alt="Streetwear">
      <img src="{% static 'images/footwear.png' %}" class="slide" alt="Footwear">
      <img src="{% static 'images/shoes.png' %}" class="slide" alt="Shoes">
      <div class="slider-nav">
        <span class="slider-dot active"></span>
        <span class="slider-dot"></span>
        <span class="slider-dot"></span>
      </div>
    </div>
    <div class="promo-text">
      <h2>WELCOME TO NEPCREW</h2>
      <a href="{% url 'products' %}" class="promo-btn">Shop Now</a>
    </div>
  </div>
</section>
{% endblock %}
