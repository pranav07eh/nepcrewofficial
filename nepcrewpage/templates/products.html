{% extends 'layouts.html' %}
{% load static %}

{% block content %}
<section class="products">
  <div class="container">
    <h1>Products</h1>
    <div class="products-grid">
      {% for product in products %}
        <div class="product-card">
          <div class="product-image">
            <img src="{% if product.image %}{{ product.image.url }}{% else %}{% static 'images/hoodie.png' %}{% endif %}" alt="{{ product.name }}">
          </div>
          <div class="product-info">
            <h3 class="product-name">{{ product.name }}</h3>
            <p class="product-price">NPR {{ product.price }}</p>
            <div class="product-actions">
              <a href="{% url 'product_detail' product.pk %}">
                <button class="btn-small view">View</button>
              </a>
              <form method="post" action="{% url 'add_to_cart' %}">
                {% csrf_token %}
                <input type="hidden" name="product_id" value="{{ product.id }}">
                <input type="hidden" name="size" value="M">
                <input type="hidden" name="qty" value="1">
                <button type="submit" class="btn-small cart">Add to Cart</button>
              </form>
            </div>
          </div>
        </div>
      {% empty %}
        <p>No products available.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
